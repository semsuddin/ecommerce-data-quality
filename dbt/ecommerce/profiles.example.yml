# Copy to ~/.dbt/profiles.yml and fill in your values.
# Primary target = BigQuery (the GCP showcase). A DuckDB target is included so
# the same models can be run with zero cloud account if needed.
ecommerce:
  target: bq
  outputs:
    bq:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: ecommerce_marts          # models build here
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      location: EU                       # match your BigQuery dataset region
      threads: 4
    duckdb:
      type: duckdb
      path: ../../data/ecommerce.duckdb
      threads: 4
